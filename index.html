<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julio 2026</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#F6F5FF;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    font-size:25px;
    font-weight:bold;
}

#bell{
    cursor:pointer;
    font-size:28px;
}

#calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
    padding:20px;
}

.day{
    background:white;
    border-radius:18px;
    aspect-ratio:1;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    transition:.2s;
}

.day:hover{
    transform:scale(1.05);
}

#curtain{
    position:fixed;
    inset:0;
    background:#8B7CF8;
    transform:translateY(100%);
    transition:.45s;
}

#panel{
    position:fixed;
    inset:0;
    background:white;
    padding:30px;
    display:none;
    overflow:auto;
}

button{
    border:none;
    background:#8B7CF8;
    color:white;
    padding:10px 20px;
    border-radius:12px;
    cursor:pointer;
}

textarea{
    width:100%;
    height:120px;
    border-radius:12px;
    padding:10px;
}

input{
    width:100%;
    padding:10px;
    border-radius:10px;
}
</style>

</head>
<body>

<header>

Julio 2026

<div id="bell">🔔</div>

</header>

<div id="calendar"></div>

<div id="curtain"></div>

<div id="panel">

<button onclick="cerrar()">← Volver</button>

<h2 id="titulo"></h2>

<h3>Horario</h3>

<p>08:00 Tecnología</p>
<p>08:45 Matemática</p>
<p>09:30 Matemática</p>

<h4>Recreo</h4>

<input placeholder="Escribe aquí">

<p>10:40 Lenguaje</p>
<p>11:25 Ed. Cívica</p>

<h4>Recreo</h4>

<input placeholder="Escribe aquí">

<h3>Notas</h3>

<textarea></textarea>

</div>

<script>

const cal=document.getElementById("calendar");

for(let i=1;i<=31;i++){

let d=document.createElement("div");

d.className="day";

d.innerHTML=i;

d.onclick=()=>abrir(i);

cal.appendChild(d);

}

function abrir(dia){

document.getElementById("titulo").innerHTML="Día "+dia;

document.getElementById("curtain").style.transform="translateY(0%)";

setTimeout(()=>{

document.getElementById("panel").style.display="block";

document.getElementById("curtain").style.transform="translateY(-100%)";

},400);

}

function cerrar(){

document.getElementById("panel").style.display="none";

document.getElementById("curtain").style.transform="translateY(100%)";

}

document.getElementById("bell").onclick=()=>{

alert("🔔\n\nMartina te envió una propuesta.\n\nMiércoles\nRecreo 9:30");

}

</script>

</body>
</html>
